<!DOCTYPE html>
<html>

<head>
    <title>Weather Dashboard</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            background-color: #f0f8ff;
        }

        input,
        button {
            padding: 10px;
            margin: 10px;
        }

        #result {
            margin-top: 20px;
            font-size: 18px;
        }
    </style>
</head>

<body>

    <h2>Weather Dashboard</h2>

    <input type="text" id="city" placeholder="Enter city">
    <button onclick="getWeather()">Get Weather</button>

    <p id="result"></p>

    <script>
        async function getWeather() {
            let city = document.getElementById("city").value;
            let result = document.getElementById("result");

            if (city === "") {
                result.innerHTML = "Please enter a city!";
                result.style.color = "red";
                return;
            }

            result.innerHTML = "Loading...";
            result.style.color = "blue";

            try {
                let response = await fetch(`https://wttr.in/${city}?format=j1`);
                let data = await response.json();

                let temp = data.current_condition[0].temp_C;
                let desc = data.current_condition[0].weatherDesc[0].value;

                result.innerHTML = `Temperature: ${temp}°C <br> Condition: ${desc}`;
                result.style.color = "green";

            } catch (error) {
                result.innerHTML = "Error fetching data!";
                result.style.color = "red";
            }
        }
    </script>

</body>

</html>
